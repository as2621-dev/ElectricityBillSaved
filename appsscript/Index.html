<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Electricity Dashboard</title>
  <style>
    :root {
      --bg: #0a0e15;
      --ink: #e9eef5;
      --muted: #7c8a9c;
      --faint: #54607180;
      --grid: rgba(255, 255, 255, 0.06);
      --card: rgba(255, 255, 255, 0.035);
      --card-border: rgba(255, 255, 255, 0.08);
      --good: #19e6a4;
      --warn: #ffb020;
      --bad: #ff5c5c;
      /* Overridden from JS once the verdict is known. */
      --accent: #19e6a4;
      --glow: rgba(25, 230, 164, 0.10);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; }
    /* Fixed viewport height — fall back to vh, prefer svh on iOS so the chart
       isn't pushed below the dynamic toolbar and the page can't scroll. */
    html { height: 100vh; height: 100svh; }
    body {
      height: 100vh;
      height: 100svh;
      overflow: hidden;
      font-family: -apple-system, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(125% 65% at 50% -5%, var(--glow), transparent 60%),
        var(--bg);
      display: flex;
      flex-direction: column;
      padding:
        max(16px, env(safe-area-inset-top))
        max(16px, env(safe-area-inset-right))
        max(14px, env(safe-area-inset-bottom))
        max(16px, env(safe-area-inset-left));
      -webkit-font-smoothing: antialiased;
    }

    .mono {
      font-family: "SF Mono", ui-monospace, "Roboto Mono", Menlo, Consolas, monospace;
      font-variant-numeric: tabular-nums;
    }

    /* ── Top bar ─────────────────────────────────────────── */
    .topbar {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .brand {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.6px;
      text-transform: uppercase;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .brand .bolt { color: var(--accent); font-size: 14px; }
    .live {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--accent);
      padding: 4px 10px;
      border-radius: 999px;
      background: var(--glow);
      border: 1px solid color-mix(in srgb, var(--accent) 35%, transparent);
    }
    .live.show { display: inline-flex; }
    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
      padding: 7px 13px;
      border-radius: 999px;
      background: var(--card);
      border: 1px solid var(--card-border);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      line-height: 1;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }
    .refresh-btn:active {
      color: var(--accent);
      border-color: color-mix(in srgb, var(--accent) 40%, transparent);
    }
    .refresh-btn:disabled { opacity: 0.5; cursor: default; }
    .refresh-icon { display: inline-block; font-size: 14px; line-height: 1; }
    .refresh-btn.spinning .refresh-icon { animation: spin 0.9s linear infinite; }
    .live .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.7s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 var(--glow); }
      50%      { opacity: 0.35; box-shadow: 0 0 0 5px transparent; }
    }

    /* ── Panel ───────────────────────────────────────────── */
    .panel {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 18px 16px 14px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }

    /* ── Header ──────────────────────────────────────────── */
    .panel-head {
      flex: 0 0 auto;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .head-right {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .head-right .mono { color: var(--muted); font-size: 11px; }
    .hero { flex: 1 1 auto; min-width: 0; }
    .hero-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.4px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2px;
    }
    .hero-headline {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px 14px;
      margin-top: 2px;
    }
    .hero-num-wrap {
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
    }
    .hero-num {
      font-size: clamp(26px, 7vw, 42px);
      font-weight: 700;
      letter-spacing: -1px;
      line-height: 1;
      color: var(--ink);
    }
    .hero-unit { font-size: 14px; font-weight: 600; color: var(--muted); }
    .hero-pills {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 4px;
    }
    .delta {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 999px;
      letter-spacing: 0.2px;
    }
    .delta.good { color: var(--good); background: rgba(25, 230, 164, 0.12); }
    .delta.bad  { color: var(--bad);  background: rgba(255, 92, 92, 0.12); }
    .sofar { font-size: 13px; color: var(--muted); }
    .sofar b { color: var(--ink); font-weight: 600; }

    /* ── Chart ───────────────────────────────────────────── */
    .chart-wrap {
      flex: 1 1 auto;
      position: relative;
      min-height: 200px;
      margin: 12px 0 6px;
    }
    .legend {
      flex: 0 0 auto;
      display: flex;
      gap: 16px;
      justify-content: center;
      font-size: 12px;
      color: var(--muted);
      padding: 8px 0 2px;
      background: var(--bg);
      border-top: 1px solid var(--card-border);
      margin-top: 6px;
    }
    .legend span { display: inline-flex; align-items: center; gap: 6px; }
    .swatch { width: 16px; height: 0; border-top: 3px solid var(--accent); border-radius: 2px; }
    .swatch.dotted { border-top-style: dotted; border-color: var(--accent); border-top-width: 3px; }
    .swatch.band {
      height: 9px; border-top: none; border-radius: 2px;
      background: rgba(255, 193, 7, 0.18);
      border: 1px solid rgba(184, 134, 11, 0.65);
    }

    /* ── Status pill ─────────────────────────────────────── */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--accent);
      padding: 3px 9px;
      border-radius: 999px;
      background: var(--glow);
      border: 1px solid color-mix(in srgb, var(--accent) 32%, transparent);
    }
    .status-pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }

    /* ── Overlay ─────────────────────────────────────────── */
    .center-msg {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      color: var(--muted);
      font-size: 15px;
      text-align: center;
      padding: 0 18px;
    }
    .spinner {
      width: 26px; height: 26px;
      border: 3px solid var(--card-border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* On narrow screens drop the verbose timestamp so the refresh button still
       fits in the top-right corner. Layout collapses to chart-first: small hero
       number, pills side-by-side under it, "so far" on its own line below. */
    @media (max-width: 560px) {
      body {
        padding:
          max(8px, env(safe-area-inset-top))
          max(10px, env(safe-area-inset-right))
          max(8px, env(safe-area-inset-bottom))
          max(10px, env(safe-area-inset-left));
      }
      .topbar { margin-bottom: 8px; }
      .panel { border-radius: 14px; padding: 12px 12px 8px; }
      .head-right .mono { display: none; }
      .hero-num { font-size: clamp(24px, 8vw, 32px); }
      .hero-unit { font-size: 12px; }
      .hero-headline {
        flex-direction: column;
        align-items: flex-start;
        gap: 6px;
      }
      .hero-pills {
        flex-direction: row;
        flex-wrap: wrap;
        gap: 6px;
      }
      .sofar { font-size: 12px; }
      .legend { gap: 12px; font-size: 11.5px; }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="brand"><span class="bolt">⚡</span>Cycle Usage</div>
    <div id="live" class="live"><span class="dot"></span>Live</div>
  </div>

  <div class="panel">
    <div class="panel-head">
      <div id="hero" class="hero" style="visibility:hidden">
        <div class="hero-label">Projected this cycle</div>
        <div class="hero-headline">
          <span class="hero-num-wrap">
            <span id="heroNum" class="hero-num mono">—</span>
            <span class="hero-unit">kWh</span>
          </span>
          <div class="hero-pills">
            <div id="delta" class="delta"></div>
            <div id="statusPill" class="status-pill" style="display:none"></div>
          </div>
          <span id="sofar" class="sofar"></span>
        </div>
      </div>
      <div class="head-right">
        <span id="footText" class="mono"></span>
        <button id="refreshBtn" class="refresh-btn" type="button" aria-label="Refresh data">
          <span class="refresh-icon">↻</span>Refresh
        </button>
      </div>
    </div>

    <div class="chart-wrap">
      <canvas id="usageChart"></canvas>
      <div id="overlay" class="center-msg"><div class="spinner"></div>Loading…</div>
    </div>

    <div id="legend" class="legend" style="display:none">
      <span><span class="swatch"></span>So far</span>
      <span><span class="swatch dotted"></span>Projected</span>
      <span><span class="swatch band"></span>Temp range</span>
      <span>💧 Rain</span>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>
  <script>
    var COLORS = { good: '#19e6a4', warn: '#ffb020', bad: '#ff5c5c' };
    var chart = null;  // current Chart.js instance, destroyed before each re-render

    /** Convert "#rrggbb" + alpha into an rgba() string. */
    function withAlpha(hex, alpha) {
      var h = hex.replace('#', '');
      var r = parseInt(h.substring(0, 2), 16);
      var g = parseInt(h.substring(2, 4), 16);
      var b = parseInt(h.substring(4, 6), 16);
      return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
    }

    function fmt(n) { return Math.round(n).toLocaleString(); }

    function setOverlay(text, spin) {
      var el = document.getElementById('overlay');
      if (!text) { el.style.display = 'none'; return; }
      el.style.display = 'flex';
      el.innerHTML = (spin ? '<div class="spinner"></div>' : '') +
        '<div>' + text + '</div>';
    }

    /** Map the server verdict to accent color + short status label. */
    function verdictTheme(d) {
      if (d.verdict === 'LIKELY CLEAR') return { accent: COLORS.good, status: 'Credit Secure' };
      if (d.verdict === 'CLOSE') return { accent: COLORS.warn, status: 'Cutting It Close' };
      return { accent: COLORS.bad, status: 'At Risk' };
    }

    function renderHeader(d, theme) {
      // Hero number = projected cycle total (the figure that decides the credit).
      document.getElementById('heroNum').textContent = fmt(d.projectedTotal);

      var m = Math.round(d.margin);
      var over = m >= 0;
      var delta = document.getElementById('delta');
      delta.className = 'delta ' + (over ? 'good' : 'bad');
      delta.textContent = (over ? '▲ +' : '▼ −') + fmt(Math.abs(m)) + ' kWh vs goal';

      // Status chip sits inline beside the delta.
      var statusPill = document.getElementById('statusPill');
      statusPill.innerHTML = '<span class="dot"></span>' + theme.status;
      statusPill.style.display = 'inline-flex';

      // "So far" = last real reading on the cumulative line, shown against the goal.
      var sofar = null;
      for (var i = d.actualCumulative.length - 1; i >= 0; i--) {
        if (d.actualCumulative[i] != null) { sofar = d.actualCumulative[i]; break; }
      }
      var sofarEl = document.getElementById('sofar');
      sofarEl.innerHTML = sofar != null
        ? '<b>' + fmt(sofar) + '</b>/' + d.threshold.toLocaleString() + ' kWh used so far'
        : '';

      document.getElementById('hero').style.visibility = 'visible';
      document.getElementById('live').classList.add('show');

      document.getElementById('footText').textContent = d.lastUpdated ? 'Updated ' + d.lastUpdated : '';
    }

    function renderChart(d, accent) {
      var suggestedMax = Math.max(d.threshold * 1.12, d.projectedTotal * 1.12, d.threshold + 50);

      // Mark "now" — the last real reading — with a glowing dot.
      var lastActualIdx = -1;
      for (var i = 0; i < d.actualCumulative.length; i++) {
        if (d.actualCumulative[i] != null) lastActualIdx = i;
      }
      var pointRadius = d.actualCumulative.map(function (_, i) { return i === lastActualIdx ? 5 : 0; });

      // Soft glow under the live line, color-matched to the verdict.
      var glowPlugin = {
        id: 'lineGlow',
        beforeDatasetDraw: function (chart, args) {
          if (args.index === 0) {
            chart.ctx.save();
            chart.ctx.shadowColor = withAlpha(accent, 0.55);
            chart.ctx.shadowBlur = 10;
          }
        },
        afterDatasetDraw: function (chart, args) {
          if (args.index === 0) chart.ctx.restore();
        }
      };

      // Mark each forecast rain day with a faint blue column + a 💧 at the top.
      // Drop size scales with precip (10 px at trace amounts, up to 22 px ≈ 1.5×
      // the previous fixed 15 px at the heaviest forecast day).
      var rainPlugin = {
        id: 'rainDrops',
        afterDatasetsDraw: function (chart) {
          if (!d.rain) return;
          var xScale = chart.scales.x;
          var area = chart.chartArea;
          var c = chart.ctx;
          var MIN_PX = 10, MAX_PX = 22, CAP_IN = 1.5;
          c.save();
          d.rain.forEach(function (val, i) {
            if (val == null) return;
            var x = xScale.getPixelForValue(i);
            c.strokeStyle = 'rgba(96, 175, 255, 0.28)';
            c.lineWidth = 1;
            c.setLineDash([2, 3]);
            c.beginPath();
            c.moveTo(x, area.top + 16);
            c.lineTo(x, area.bottom);
            c.stroke();
            c.setLineDash([]);
            var t = Math.min(val, CAP_IN) / CAP_IN;
            var size = MIN_PX + (MAX_PX - MIN_PX) * t;
            c.font = size.toFixed(1) + 'px sans-serif';
            c.textAlign = 'center';
            c.textBaseline = 'top';
            c.fillText('💧', x, area.top);
          });
          c.restore();
        }
      };

      var ctx = document.getElementById('usageChart').getContext('2d');
      if (chart) chart.destroy();  // avoid stacking instances on refresh
      chart = new Chart(ctx, {
        type: 'line',
        plugins: [glowPlugin, rainPlugin],
        data: {
          labels: d.labels,
          datasets: [
            {
              label: 'So far',
              data: d.actualCumulative,
              borderColor: accent,
              borderWidth: 3,
              tension: 0.25,
              spanGaps: true,
              fill: true,
              pointRadius: pointRadius,
              pointBackgroundColor: accent,
              pointBorderColor: '#0a0e15',
              pointBorderWidth: 2,
              backgroundColor: function (c) {
                var area = c.chart.chartArea;
                if (!area) return 'transparent';
                var g = c.chart.ctx.createLinearGradient(0, area.top, 0, area.bottom);
                g.addColorStop(0, withAlpha(accent, 0.32));
                // Fade out by the chart midline so the gradient doesn't tint the
                // legend strip below the chart (it sits on top of var(--bg)).
                g.addColorStop(0.55, withAlpha(accent, 0));
                g.addColorStop(1, withAlpha(accent, 0));
                return g;
              }
            },
            {
              label: 'Projected',
              data: d.projectedCumulative,
              borderColor: accent,
              borderWidth: 2.5,
              borderDash: [2, 5],
              borderCapStyle: 'round',
              tension: 0.25,
              spanGaps: true,
              fill: false,
              pointRadius: 0
            },
            {
              label: 'High',
              data: d.tempMax,
              yAxisID: 'y1',
              borderColor: 'rgba(184, 134, 11, 0.65)',
              borderWidth: 1,
              tension: 0.35,
              spanGaps: true,
              pointRadius: 0,
              order: 2,           // drawn behind the kWh lines
              fill: '+1',         // shade down to the Low line → daily temp band
              backgroundColor: 'rgba(255, 193, 7, 0.18)'
            },
            {
              label: 'Low',
              data: d.tempMin,
              yAxisID: 'y1',
              borderColor: 'rgba(184, 134, 11, 0.65)',
              borderWidth: 1,
              tension: 0.35,
              spanGaps: true,
              pointRadius: 0,
              fill: false,
              order: 2
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 700, easing: 'easeOutQuart' },
          interaction: { intersect: false, mode: 'index' },
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(12, 17, 25, 0.95)',
              borderColor: withAlpha(accent, 0.5),
              borderWidth: 1,
              titleColor: '#e9eef5',
              bodyColor: '#c2cbd6',
              padding: 10,
              cornerRadius: 8,
              displayColors: false,
              callbacks: {
                label: function (item) {
                  if (item.parsed.y == null) return null;
                  if (item.dataset.yAxisID === 'y1') return item.dataset.label + ': ' + Math.round(item.parsed.y) + '°F';
                  return item.dataset.label + ': ' + fmt(item.parsed.y) + ' kWh';
                },
                afterBody: function (items) {
                  if (!items.length || !d.rain) return '';
                  var i = items[0].dataIndex;
                  return d.rain[i] != null ? '💧 Rain ~' + d.rain[i] + ' in' : '';
                }
              }
            },
            annotation: {
              annotations: {
                goal: {
                  type: 'line',
                  yMin: d.threshold,
                  yMax: d.threshold,
                  borderColor: 'rgba(255, 92, 92, 0.75)',
                  borderWidth: 1.8,
                  borderDash: [5, 5]
                }
              }
            }
          },
          scales: {
            y: {
              beginAtZero: true,
              suggestedMax: suggestedMax,
              border: { display: false },
              grid: { color: 'rgba(255, 255, 255, 0.06)', drawTicks: false },
              ticks: {
                font: { size: 11 },
                padding: 8,
                maxTicksLimit: 5,
                // Highlight the threshold tick (1,000 kWh) in red to match the
                // dashed goal line, since the in-chart label has been removed.
                color: function (ctx) {
                  return ctx.tick && ctx.tick.value === d.threshold ? '#ff5c5c' : '#7c8a9c';
                }
              }
            },
            y1: {
              position: 'right',
              beginAtZero: false,
              border: { display: false },
              grid: { drawOnChartArea: false },
              ticks: {
                color: 'rgba(184, 134, 11, 0.95)',
                font: { size: 11 },
                padding: 6,
                maxTicksLimit: 5,
                callback: function (v) { return Math.round(v) + '°'; }
              }
            },
            x: {
              border: { display: false },
              grid: { display: false },
              ticks: { color: '#7c8a9c', font: { size: 11 }, autoSkip: true, maxTicksLimit: 6, maxRotation: 0 }
            }
          }
        }
      });
    }

    function render(d) {
      if (!d || !d.labels || !d.labels.length) {
        document.getElementById('legend').style.display = 'none';
        setOverlay('No data yet. Tap ↻ to refresh.', false);
        return;
      }
      var theme = verdictTheme(d);
      document.documentElement.style.setProperty('--accent', theme.accent);
      document.documentElement.style.setProperty('--glow', withAlpha(theme.accent, 0.10));

      setOverlay('');
      renderHeader(d, theme);
      renderChart(d, theme.accent);
      document.getElementById('legend').style.display = 'flex';
    }

    function showError(err) {
      document.getElementById('legend').style.display = 'none';
      setOverlay('Could not load data. Please try again later.', false);
      console.error(err);
    }

    /** Fetch the latest precomputed dashboard payload and render it. */
    function loadDashboard() {
      google.script.run.withSuccessHandler(render).withFailureHandler(showError).getDashboardData();
    }

    function endRefresh() {
      var btn = document.getElementById('refreshBtn');
      btn.disabled = false;
      btn.classList.remove('spinning');
    }

    /**
     * Manual refresh: run the full server pipeline (import → weather → project),
     * then reload the dashboard. Two round trips because runDailyUpdate returns
     * the summary, not the chart payload.
     */
    function refreshNow() {
      var btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.classList.add('spinning');
      setOverlay('Refreshing…', true);
      google.script.run
        .withSuccessHandler(function () {
          google.script.run
            .withSuccessHandler(function (d) { render(d); endRefresh(); })
            .withFailureHandler(function (e) { showError(e); endRefresh(); })
            .getDashboardData();
        })
        .withFailureHandler(function (e) { showError(e); endRefresh(); })
        .runDailyUpdate();
    }

    document.getElementById('refreshBtn').addEventListener('click', refreshNow);
    loadDashboard();
  </script>
</body>
</html>
